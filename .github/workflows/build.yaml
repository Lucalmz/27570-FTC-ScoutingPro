name: Build Installers

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        # 你的矩阵环境配置建议改成这样：
        os: [ windows-latest, macos-15-intel, macos-latest ]
        include:
          - os: windows-latest
            installer_ext: exe
            arch_name: x64
          - os: macos-15-intel # 继续保留这个，用来兼容被 macOS 26 淘汰掉的老旧 Intel 机器
            installer_ext: dmg
            arch_name: intel
          - os: macos-latest # 这个标签目前会指向最新的 macOS 26 Tahoe (Apple Silicon) 环境
            installer_ext: dmg
            arch_name: apple-silicon

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 1. 打包 Fat Jar (Maven 会根据当前的 runner OS 自动下载对应的 JavaFX 平台库)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 2. 准备 JPackage 的输入目录 (关键修复！)
      - name: Prepare JPackage Input
        shell: bash
        run: |
          mkdir -p target/jpackage-input
          # 将 shade 插件生成的 fat jar 复制到 input 目录中
          cp target/*.jar target/jpackage-input/

      # 3. 运行 JPackage 生成安装包
      - name: Create Installer with JPackage
        run: mvn jpackage:jpackage

      # 4. 上传产物 (重命名以便用户区分芯片版本)
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: FTCScoutingPro-${{ runner.os }}-${{ matrix.arch_name }}
          path: target/dist/*.${{ matrix.installer_ext }}